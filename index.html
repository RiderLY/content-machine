<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina OS v4.0 - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-main: #0b0b10; --bg-sidebar: #13131a; --bg-panel: #16161e; --bg-input: #20202b; 
            --text-main: #e2e8f0; --text-muted: #64748b; 
            --accent-glow: #c084fc; --btn-light: #d8b4fe; --btn-text: #2e1065; 
            --border-color: #2a2a3f; --error: #ef4444; --success: #22c55e; --warning: #eab308;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Notifications */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { padding: 12px 20px; border-radius: 12px; margin-bottom: 10px; color: white; font-size: 14px; font-weight: 600; animation: slideIn 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 25px 0; }
        .logo-area { padding: 0 25px 30px; font-weight: 900; color: var(--btn-light); font-size: 20px; letter-spacing: 1px; text-transform: uppercase;}
        .nav-item { padding: 12px 25px; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .nav-item.active { color: var(--btn-light); background: rgba(192, 132, 252, 0.08); border-right: 3px solid var(--accent-glow); }
        
        .section-title { padding: 0 25px; font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin: 20px 0 10px; }
        .channel-item { padding: 10px 25px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-main); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin-top: 20px; }
        .cal-header { text-align: center; color: var(--text-muted); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .cal-day { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; min-height: 120px; padding: 12px; cursor: pointer; transition: 0.2s; }
        .cal-day:hover { border-color: var(--accent-glow); }
        .day-num { font-size: 14px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; }
        .post-chip { background: var(--bg-input); font-size: 10px; padding: 4px 8px; border-radius: 6px; border-left: 2px solid var(--accent-glow); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Формы и кнопки */
        input, textarea, select { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px; color: white; padding: 14px; margin-bottom: 15px; outline: none; }
        button.action { background: var(--btn-light); color: var(--btn-text); width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        button.action:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ТАБЫ СОЦСЕТЕЙ */
        .network-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .net-tab { padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; opacity: 0.6; transition: 0.3s; color: var(--text-main); }
        .net-tab.active { background: var(--bg-input); opacity: 1; border: 1px solid var(--accent-glow); }

        /* ХЕШТЕГИ */
        .hashtag-manager { background: var(--bg-panel); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .tag-group { display: inline-block; background: var(--bg-input); padding: 5px 12px; border-radius: 8px; margin: 4px; cursor: pointer; font-size: 12px; transition: 0.2s; border: 1px solid transparent; }
        .tag-group:hover { border-color: var(--accent-glow); }

        /* Платформы */
        .plat-btn { padding: 10px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer; text-align: center; font-size: 12px; transition: 0.2s; }
        .plat-btn.active { border-color: var(--accent-glow); color: var(--btn-light); background: rgba(192, 132, 252, 0.15); box-shadow: 0 0 10px rgba(192, 132, 252, 0.1); }

        /* СПЕЦИФИЧЕСКИЕ НАСТРОЙКИ */
        .extra-settings { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .extra-settings.active { display: grid; }

        /* МОДАЛКИ */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal { background: var(--bg-sidebar); width: 1000px; border-radius: 24px; border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; }
        .modal-grid { display: grid; grid-template-columns: 1.2fr 1fr; }

        .img-editor-controls { display: flex; gap: 5px; margin-top: 10px; }
        .format-btn { font-size: 10px; padding: 6px 10px; background: var(--bg-input); border: 1px solid var(--border-color); color: white; border-radius: 6px; cursor: pointer; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: 5000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="auth-screen">
        <div style="width: 340px; text-align: center; background: var(--bg-panel); padding: 40px; border-radius: 28px; border: 1px solid var(--border-color);">
            <h1 style="color: var(--btn-light); margin-bottom: 20px;">Lumina</h1>
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Password">
            <button class="action" id="authBtn" onclick="handleAuth()">Войти</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-area">Lumina OS</div>
        <button class="action" style="margin: 0 20px 20px; width: auto; padding: 12px;" onclick="attemptOpenModal()">+ Создать пост</button>
        <div class="nav-item active" onclick="switchView('calendar', this)">🗓 Календарь</div>
        <div class="nav-item" onclick="switchView('list', this)">📋 Очередь</div>
        <div class="section-title">Твои каналы</div>
        <div id="connectedChannelsList"></div>
        <div class="nav-item" style="color: var(--btn-light);" onclick="openConnectModal()">+ Подключить соцсеть</div>
        <div style="margin-top: auto; padding: 25px;">
            <button onclick="logout()" style="background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 12px;">Выход</button>
        </div>
    </div>

    <div class="main-content" id="app-body" style="display: none;">
        <div id="v-calendar" class="view-section active">
            <h1 id="monthTitle" style="font-size: 28px; margin-bottom: 25px;">Апрель 2026</h1>
            <div class="calendar-grid" id="grid"></div>
        </div>
        <div id="v-list" class="view-section">
            <h1 style="font-size: 28px; margin-bottom: 25px;">📋 Очередь публикаций</h1>
            <div id="listViewContainer"></div>
        </div>
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <div style="padding: 20px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h3>Создать пост</h3>
                <span style="cursor:pointer; font-size: 24px;" onclick="closeModal('postModal')">&times;</span>
            </div>
            <div class="modal-grid">
                <div style="padding: 25px; border-right: 1px solid var(--border-color);">
                    <div class="network-tabs" id="networkTabs">
                        <div class="net-tab active" onclick="switchNetTab(this, 'general')">📝 Общее</div>
                        <div class="net-tab" onclick="switchNetTab(this, 'instagram')">📸 Instagram</div>
                        <div class="net-tab" onclick="switchNetTab(this, 'youtube')">▶️ YouTube</div>
                    </div>

                    <textarea id="mainText" rows="6" placeholder="О чем расскажем сегодня?"></textarea>

                    <div class="hashtag-manager">
                        <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-weight: 800;">БЫСТРЫЕ ХЕШТЕГИ</div>
                        <div id="hashtagList">
                            <div class="tag-group" onclick="insertTags('#ai #coding #web3')">🚀 Продвижение</div>
                            <div class="tag-group" onclick="insertTags('#lifestyle #blog #daily')">📱 Лайфстайл</div>
                        </div>
                    </div>

                    <div id="mediaArea">
                        <div id="uploadArea" onclick="document.getElementById('fileInput').click()" style="border: 2px dashed var(--border-color); padding: 30px; text-align: center; border-radius: 12px; cursor:pointer;">
                            🖼 Выберите медиафайл
                        </div>
                        <div id="previewContainer" style="display:none;">
                            <img id="mediaPreview" style="width:100%; border-radius:12px; object-fit: cover;">
                            <div class="img-editor-controls">
                                <div class="format-btn" onclick="resizeImg('1:1')">1:1</div>
                                <div class="format-btn" onclick="resizeImg('4:5')">4:5</div>
                                <div class="format-btn" onclick="resizeImg('16:9')">16:9</div>
                                <button onclick="removeMedia()" style="margin-left:auto; background:var(--error); border:none; color:white; padding:4px 8px; border-radius:6px; cursor:pointer;">Удалить</button>
                            </div>
                        </div>
                        <input type="file" id="fileInput" hidden onchange="handleFileSelect(this)">
                    </div>
                </div>

                <div style="padding: 25px; background: var(--bg-panel);">
                    
                    <div id="settings-general" class="extra-settings active">
                        <div style="grid-column: span 2;">
                            <label style="font-size:11px; font-weight: 800; color:var(--text-muted)">ГДЕ ПОСТИМ?</label>
                            <div id="dynamicPlatList" style="display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap;"></div>
                        </div>
                        
                        <div style="grid-column: span 2; margin-top: 10px;">
                            <label style="font-size:11px; font-weight: 800; color:var(--text-muted)">ДАТА И ВРЕМЯ</label>
                            <div style="display:flex; gap:10px; margin-top:8px;">
                                <input type="date" id="postDateOnly">
                                <input type="time" id="postTimeOnly">
                            </div>
                        </div>
                    </div>

                    <div id="settings-youtube" class="extra-settings">
                        <div style="grid-column: span 2;">
                            <label style="font-size:11px; font-weight: 800;">ЗАГОЛОВОК (YouTube)</label>
                            <input type="text" id="ytTitle" placeholder="Введите название...">
                        </div>
                        <div>
                            <label style="font-size:11px;">КАТЕГОРИЯ</label>
                            <select id="ytCategory">
                                <option>Люди и блоги</option>
                                <option>Игры</option>
                                <option>Образование</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size:11px;">ВИДИМОСТЬ</label>
                            <select id="ytVisibility">
                                <option>Общественный</option>
                                <option>Доступ по ссылке</option>
                            </select>
                        </div>
                        <div style="grid-column: span 2;">
                            <label><input type="checkbox" id="ytKids" style="width:auto;"> Сделано для детей</label>
                        </div>
                    </div>

                    <div id="settings-instagram" class="extra-settings">
                        <div style="grid-column: span 2;">
                            <label style="font-size:11px; font-weight: 800;">ТИП ПУБЛИКАЦИИ</label>
                            <div style="display:flex; gap:15px; margin-top:10px;">
                                <label><input type="radio" name="ig_type" value="Post" checked> Пост</label>
                                <label><input type="radio" name="ig_type" value="Reel"> Reel</label>
                                <label><input type="radio" name="ig_type" value="Story"> Story</label>
                            </div>
                        </div>
                        <div style="grid-column: span 2; margin-top:15px;">
                            <label style="font-size:11px;">ПЕРВЫЙ КОММЕНТАРИЙ</label>
                            <textarea id="igFirstComment" rows="2" placeholder="Ваш текст..."></textarea>
                        </div>
                    </div>

                    <button class="action" style="margin-top: 20px;" id="saveBtn" onclick="savePost()">Запланировать</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="connectModal">
        <div class="modal" style="width: 500px; padding: 30px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>Подключить сеть</h2>
                <span style="cursor:pointer; font-size: 24px;" onclick="closeModal('connectModal')">&times;</span>
            </div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                <div class="plat-btn" onclick="connectChannel('TikTok', '🎵')">🎵 TikTok</div>
                <div class="plat-btn" onclick="connectChannel('YouTube', '▶️')">▶️ YouTube</div>
                <div class="plat-btn" onclick="connectChannel('Instagram', '📸')">📸 Instagram</div>
                <div class="plat-btn" onclick="connectChannel('Pinterest', '📌')">📌 Pinterest</div>
            </div>
        </div>
    </div>

    <script> 
        const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM"; 
        const WEBHOOK_URL = "https://hook.eu1.make.com/g9xrfqjlwxkmwe5ucxcvtl7e7a97qdyr"; 
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let user = null, posts = [], selectedFile = null, connectedChannels = [], currentDate = new Date();

        function showToast(msg, type='success') {
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = type === 'success' ? 'var(--success)' : 'var(--error)';
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // --- ЛОГИКА ТАБОВ И ХЕШТЕГОВ ---
        function switchNetTab(element, net) {
            document.querySelectorAll('.net-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            document.querySelectorAll('.extra-settings').forEach(s => s.classList.remove('active'));
            document.getElementById('settings-' + net).classList.add('active');
        }

        function insertTags(tags) {
            const textarea = document.getElementById('mainText');
            textarea.value = textarea.value.trim() + " " + tags;
            showToast("Хештеги добавлены");
        }

        function resizeImg(format) {
            const img = document.getElementById('mediaPreview');
            img.style.aspectRatio = format.replace(':', '/');
            img.style.objectFit = "cover";
            showToast("Формат: " + format);
        }

        // --- AUTH ---
        async function handleAuth() {
            const email = document.getElementById('email').value, password = document.getElementById('pass').value;
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: sError } = await db.auth.signUp({ email, password });
                if (sError) showToast(sError.message, 'error');
                else showToast("Аккаунт создан! Войдите снова.");
            }
        }

        db.auth.onAuthStateChange((ev, session) => {
            if (session) { user = session.user; initApp(); }
            else { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-body').style.display = 'none'; }
        });

        async function initApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-body').style.display = 'block';
            loadData();
        }

        async function loadData() {
            const { data: pData } = await db.from('posts').select('*').eq('user_id', user.id);
            if (pData) posts = pData;
            const { data: cData } = await db.from('channels').select('*').eq('user_id', user.id);
            if (cData) connectedChannels = cData;
            renderChannels(); renderCalendar(); renderListView();
        }

        // --- КАНАЛЫ ---
        function openConnectModal() {
            document.getElementById('connectModal').style.display = 'flex';
        }

        async function connectChannel(platform, icon) {
            if (connectedChannels.find(c => c.platform === platform)) return showToast("Уже подключено", "warning");
            await db.from('channels').insert([{ user_id: user.id, platform, icon }]);
            showToast(`${platform} подключен!`);
            loadData(); 
            closeModal('connectModal');
        }

        // --- СОХРАНЕНИЕ ---
        async function savePost() {
            const btn = document.getElementById('saveBtn');
            const text = document.getElementById('mainText').value;
            const date = document.getElementById('postDateOnly').value;
            const time = document.getElementById('postTimeOnly').value;
            
            const plats = Array.from(document.querySelectorAll('.plat-btn.active')).map(b => b.dataset.name);

            if (!date || !time) return showToast("Укажите дату и время!", "error");
            if (plats.length === 0) return showToast("Выберите хотя бы один канал!", "error");
            btn.disabled = true;

            try {
                let media_url = null;
                if (selectedFile) {
                    const fileName = `${Date.now()}_${selectedFile.name}`;
                    const { data } = await db.storage.from('media').upload(`${user.id}/${fileName}`, selectedFile);
                    if (data) media_url = db.storage.from('media').getPublicUrl(`${user.id}/${fileName}`).data.publicUrl;
                }

                const extraMetadata = {
                    yt_title: document.getElementById('ytTitle').value,
                    yt_category: document.getElementById('ytCategory').value,
                    ig_type: document.querySelector('input[name="ig_type"]:checked').value,
                    ig_comment: document.getElementById('igFirstComment').value
                };

                const postObj = { 
                    user_id: user.id, 
                    text, 
                    post_date: `${date}T${time}`, 
                    platforms: plats, 
                    media_url, 
                    status: 'scheduled',
                    extra_metadata: extraMetadata 
                };

                await db.from('posts').insert([postObj]);
                fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(postObj) });

                showToast("Успешно запланировано!");
                closeModal('postModal'); loadData();
            } catch (e) { showToast(e.message, 'error'); }
            finally { btn.disabled = false; }
        }

        // --- UI RENDER ---
        function renderCalendar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div class="cal-header">${d}</div>`).join('');
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayPosts = posts.filter(p => p.post_date.includes(dateStr));
                grid.innerHTML += `<div class="cal-day" onclick="attemptOpenModal('${dateStr}')">
                    <div class="day-num">${d}</div>
                    ${dayPosts.map(p => `<div class="post-chip">${p.text || 'Пост'}</div>`).join('')}
                </div>`;
            }
        }

        function renderChannels() {
            document.getElementById('connectedChannelsList').innerHTML = connectedChannels.map(c => `
                <div class="channel-item"><span>${c.icon}</span> ${c.platform} <div class="status-dot" style="margin-left:auto;"></div></div>
            `).join('');
        }

        function renderListView() {
            const container = document.getElementById('listViewContainer');
            container.innerHTML = posts.length ? posts.map(p => `
                <div style="background:var(--bg-panel); padding:20px; border-radius:16px; margin-bottom:10px; border:1px solid var(--border-color);">
                    <p>${p.text || 'Медиа контент'}</p>
                    <small style="color:var(--text-muted); display:block; margin-top:10px;">📅 ${p.post_date.replace('T', ' ')}</small>
                </div>
            `).join('') : '<p style="color:var(--text-muted)">Очередь пуста</p>';
        }

        function attemptOpenModal(date = '') {
            if (connectedChannels.length === 0) return showToast("Сначала подключи соцсеть!", "warning");
            document.getElementById('postModal').style.display = 'flex';
            document.getElementById('postDateOnly').value = date;
            
            document.getElementById('dynamicPlatList').innerHTML = connectedChannels.map(c => `
                <div class="plat-btn" onclick="this.classList.toggle('active')" data-name="${c.platform}">${c.icon} ${c.platform}</div>
            `).join('');

            const firstTab = document.querySelector('.net-tab');
            if (firstTab) switchNetTab(firstTab, 'general');
        }

        function handleFileSelect(input) {
            if (input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('mediaPreview').src = URL.createObjectURL(selectedFile);
            }
        }

        function removeMedia() { selectedFile = null; document.getElementById('previewContainer').style.display = 'none'; document.getElementById('uploadArea').style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function switchView(v, el) { 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); document.getElementById('v-'+v).classList.add('active');
        }
        function logout() { db.auth.signOut(); }
    </script>
</body>
</html>
