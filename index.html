<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina OS v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-main: #0b0b10; --bg-sidebar: #13131a; --bg-panel: #16161e; --bg-input: #20202b; 
            --text-main: #e2e8f0; --text-muted: #64748b; 
            --accent-glow: #c084fc; --btn-light: #d8b4fe; --btn-text: #2e1065; 
            --border-color: #2a2a3f; --error: #ef4444; --success: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Notifications */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { padding: 12px 20px; border-radius: 12px; margin-bottom: 10px; color: white; font-size: 14px; font-weight: 600; animation: slideIn 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-left: 4px solid rgba(255,255,255,0.3); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 25px 0; }
        .nav-item { padding: 14px 25px; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; }
        .nav-item:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
        .nav-item.active { color: var(--btn-light); background: rgba(192, 132, 252, 0.08); border-right: 3px solid var(--accent-glow); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin-top: 20px; }
        .cal-header { text-align: center; color: var(--text-muted); font-size: 11px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .cal-day { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; min-height: 140px; padding: 15px; position: relative; }
        .day-num { font-size: 14px; font-weight: 800; color: var(--text-muted); }
        .day-num.today { color: var(--accent-glow); }

        /* Cards & UI */
        .post-chip { background: var(--bg-input); font-size: 11px; padding: 6px 10px; border-radius: 8px; border-left: 3px solid var(--accent-glow); margin-top: 5px; cursor: pointer; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .post-chip:hover { background: #2d2d3d; transform: translateX(3px); }

        /* Modal & Forms */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal { background: var(--bg-sidebar); width: 900px; max-height: 90vh; border-radius: 24px; border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; }
        .modal-grid { display: grid; grid-template-columns: 1.3fr 1fr; flex: 1; overflow-y: auto; }
        
        input, textarea, select { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px; color: white; padding: 14px; margin-bottom: 15px; outline: none; font-size: 14px; }
        button.action { background: var(--btn-light); color: var(--btn-text); width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        button.action:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button.action:disabled { opacity: 0.5; cursor: not-allowed; }

        .upload-area { border: 2px dashed var(--border-color); border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-area:hover { border-color: var(--accent-glow); background: rgba(192, 132, 252, 0.02); }
        .preview-box { width: 100%; height: 180px; border-radius: 12px; object-fit: cover; display: none; margin-bottom: 15px; }

        .plat-btn { padding: 10px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer; text-align: center; font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .plat-btn.active { border-color: var(--accent-glow); color: var(--btn-light); background: rgba(192, 132, 252, 0.1); }

        #auth-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: 5000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="auth-screen">
        <div style="width: 340px; text-align: center; background: var(--bg-panel); padding: 40px; border-radius: 28px; border: 1px solid var(--border-color);">
            <h1 style="color: var(--btn-light); margin-bottom: 10px; font-size: 28px;">Lumina</h1>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 30px;">Авторизация в Content Machine</p>
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Password">
            <button class="action" id="authBtn" onclick="handleAuth()">Войти или Создать</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="padding: 0 25px 40px; font-weight: 900; color: var(--btn-light); font-size: 20px; letter-spacing: 1px;">LUMINA OS</div>
        <div class="nav-item active" onclick="switchView('calendar', this)">🗓 Публикации</div>
        <div class="nav-item" onclick="switchView('list', this)">📋 Очередь</div>
        <div class="nav-item" onclick="switchView('analytics', this)">📊 Аналитика</div>
        <div style="margin-top: auto; padding: 25px;">
            <button onclick="logout()" style="background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 12px; width: 100%; border-radius: 12px; cursor: pointer;">Выйти</button>
        </div>
    </div>

    <div class="main-content" id="app-body" style="display: none;">
        <div id="v-calendar" class="view-section active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px;">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <h1 id="monthTitle" style="font-size: 32px; font-weight: 800;">Месяц</h1>
                    <div style="display: flex; gap: 8px;">
                        <button style="padding: 8px 12px; background: var(--bg-input); border:none; border-radius: 8px; color: white; cursor:pointer;" onclick="changeMonth(-1)">❮</button>
                        <button style="padding: 8px 12px; background: var(--bg-input); border:none; border-radius: 8px; color: white; cursor:pointer;" onclick="changeMonth(1)">❯</button>
                    </div>
                </div>
                <button class="action" style="width: auto; padding: 12px 30px;" onclick="openModal()">+ Новый пост</button>
            </div>
            <div class="calendar-grid" id="grid"></div>
        </div>

        <div id="v-list" class="view-section">
            <h1 style="font-size: 32px; margin-bottom: 30px;">📋 Очередь публикаций</h1>
            <div id="listViewContainer"></div>
        </div>
        
        <div id="v-analytics" class="view-section"><h1>📊 Аналитика скоро...</h1></div>
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <div style="padding: 25px 35px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h2 id="modalTitle" style="font-size: 20px; font-weight: 800;">Новый контент</h2>
                <span style="cursor:pointer; font-size: 30px; color: var(--text-muted);" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-grid">
                <div style="padding: 35px; border-right: 1px solid var(--border-color);">
                    <img id="mediaPreview" class="preview-box">
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                        <div style="font-size: 30px; margin-bottom: 10px;">☁️</div>
                        <p style="font-size: 13px; font-weight: 600;">Нажми для загрузки медиа</p>
                        <p style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">JPG, PNG, MP4 до 50MB</p>
                        <input type="file" id="fileInput" hidden onchange="handleFileSelect(this)">
                    </div>
                    
                    <textarea id="mainText" rows="6" placeholder="О чем сегодня расскажем? (Поддерживает хештеги)"></textarea>
                    
                    <label style="font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block;">Выберите площадки</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;" id="platList">
                        <div class="plat-btn" onclick="togglePlat(this)">Instagram</div>
                        <div class="plat-btn" onclick="togglePlat(this)">TikTok</div>
                        <div class="plat-btn" onclick="togglePlat(this)">Telegram</div>
                        <div class="plat-btn" onclick="togglePlat(this)">YouTube Shorts</div>
                    </div>
                </div>
                
                <div style="padding: 35px; background: var(--bg-panel);">
                    <label style="font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block;">Дата публикации</label>
                    <input type="datetime-local" id="postDate">
                    
                    <div style="margin-top: 30px;">
                        <button class="action" id="saveBtn" onclick="savePost()">Запланировать</button>
                        <button style="margin-top: 15px; width: 100%; background: none; border: 1px solid var(--error); color: var(--error); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 13px; display: none;" id="deleteBtn" onclick="deletePost()">Удалить публикацию</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let user = null, posts = [], currentEditingId = null, selectedFile = null;
        let currentDate = new Date();

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = type === 'success' ? 'var(--success)' : 'var(--error)';
            t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        // --- AUTH LOGIC ---
        async function handleAuth() {
            const email = document.getElementById('email').value, password = document.getElementById('pass').value;
            const btn = document.getElementById('authBtn');
            if(!email || !password) return showToast("Заполни данные!", "error");
            
            btn.disabled = true; btn.innerText = "Синхронизация...";

            const { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) {
                // FALLBACK: Регистрация
                const { error: signUpError } = await db.auth.signUp({ email, password });
                if (signUpError) {
                    showToast(signUpError.message, "error");
                    btn.disabled = false; btn.innerText = "Войти или Создать";
                } else {
                    showToast("Аккаунт создан! Подтверди почту или войди.", "success");
                }
            }
        }

        db.auth.onAuthStateChange((event, session) => {
            if (session) {
                user = session.user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-body').style.display = 'block';
                loadData();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-body').style.display = 'none';
            }
        });

        function logout() { db.auth.signOut(); }

        // --- DATA LOAD ---
        async function loadData() {
            const { data, error } = await db.from('posts').select('*').eq('user_id', user.id).order('post_date', { ascending: true });
            if(error) return showToast(error.message, "error");
            posts = data || [];
            renderCalendar();
            renderListView();
        }

        // --- CALENDAR LOGIC ---
        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }

        function renderCalendar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div class="cal-header">${d}</div>`).join('');
            
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            document.getElementById('monthTitle').innerText = `${monthNames[month]} ${year}`;

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1; 
            
            for (let i = 0; i < startOffset; i++) grid.innerHTML += '<div class="cal-day" style="border:none; background:none;"></div>';
            
            const now = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayPosts = posts.filter(p => p.post_date && p.post_date.includes(dateStr));
                const isToday = (d === now.getDate() && month === now.getMonth() && year === now.getFullYear());
                
                grid.innerHTML += `<div class="cal-day" onclick="if(event.target==this) openModal('${dateStr}')">
                    <div class="day-num ${isToday ? 'today' : ''}">${d}</div>
                    ${dayPosts.map(p => `<div class="post-chip" onclick="editPost('${p.id}')">${p.text || 'Без текста'}</div>`).join('')}
                </div>`;
            }
        }

        // --- FILE STORAGE LOGIC ---
        function handleFileSelect(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('mediaPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('uploadArea').style.display = 'none';
                }
                reader.readAsDataURL(selectedFile);
            }
        }

        async function uploadMedia(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const filePath = `${user.id}/${fileName}`;

            const { data, error } = await db.storage.from('media').upload(filePath, file);
            if (error) throw error;

            const { data: { publicUrl } } = db.storage.from('media').getPublicUrl(filePath);
            return publicUrl;
        }

        // --- CRUD LOGIC ---
        function togglePlat(el) { el.classList.toggle('active'); }

        function openModal(dateStr = '') {
            currentEditingId = null; selectedFile = null;
            document.getElementById('modalTitle').innerText = "Новая публикация";
            document.getElementById('mainText').value = "";
            document.getElementById('postDate').value = dateStr ? dateStr + 'T12:00' : '';
            document.getElementById('mediaPreview').style.display = 'none';
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('deleteBtn').style.display = 'none';
            document.querySelectorAll('.plat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('postModal').style.display = 'flex';
        }

        function editPost(id) {
            const post = posts.find(p => String(p.id) === String(id));
            if (!post) return;
            currentEditingId = id;
            document.getElementById('modalTitle').innerText = "Детали публикации";
            document.getElementById('mainText').value = post.text || "";
            document.getElementById('postDate').value = post.post_date ? post.post_date.slice(0, 16) : "";
            document.getElementById('deleteBtn').style.display = "block";
            
            if (post.media_url) {
                const preview = document.getElementById('mediaPreview');
                preview.src = post.media_url;
                preview.style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
            }

            const safePlatforms = post.platforms || []; 
            document.querySelectorAll('.plat-btn').forEach(b => {
                b.classList.toggle('active', safePlatforms.includes(b.innerText));
            });
            document.getElementById('postModal').style.display = 'flex';
        }

        async function savePost() {
            const btn = document.getElementById('saveBtn');
            const text = document.getElementById('mainText').value;
            const date = document.getElementById('postDate').value;
            const plats = Array.from(document.querySelectorAll('.plat-btn.active')).map(b => b.innerText);
            
            if (!date || plats.length === 0) return showToast("Выбери дату и хотя бы одну сеть!", "error");
            
            btn.disabled = true; btn.innerText = "Синхронизация...";

            try {
                let media_url = null;
                if (selectedFile) {
                    media_url = await uploadMedia(selectedFile);
                } else if (currentEditingId) {
                    media_url = posts.find(p => p.id === currentEditingId).media_url;
                }

                const postData = { user_id: user.id, text, post_date: date, platforms: plats, media_url, status: 'pending' };
                
                const { error } = currentEditingId 
                    ? await db.from('posts').update(postData).eq('id', currentEditingId)
                    : await db.from('posts').insert([postData]);

                if (error) throw error;
                
                showToast("Успешно сохранено!");
                closeModal();
                loadData();
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false; btn.innerText = "Запланировать";
            }
        }

        async function deletePost() {
            if (!confirm("Удалить публикацию?")) return;
            const { error } = await db.from('posts').delete().eq('id', currentEditingId);
            if (error) showToast(error.message, "error");
            else { showToast("Удалено"); closeModal(); loadData(); }
        }

        function closeModal() { document.getElementById('postModal').style.display = 'none'; }
        
        function switchView(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
        }
        
        function renderListView() {
            const container = document.getElementById('listViewContainer');
            if (posts.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Очередь пуста</p>';
                return;
            }
            container.innerHTML = posts.map(p => `
                <div style="background:var(--bg-panel); padding:20px; border-radius:16px; border:1px solid var(--border-color); margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="editPost('${p.id}')">
                    <div>
                        <p style="color:var(--accent-glow); font-size:12px; font-weight:bold;">${new Date(p.post_date).toLocaleString()}</p>
                        <p style="margin:5px 0;">${p.text || 'Без текста'}</p>
                        <p style="font-size:11px; color:var(--text-muted);">${p.platforms.join(', ')}</p>
                    </div>
                    ${p.media_url ? `<img src="${p.media_url}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;">` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
