<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina OS Pro - Стиль Buffer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-neutral: #0b0b10;
            --color-bg-sidebar: #13131a;
            --color-bg-panel: #1c1c26;
            --color-primary: #2c4bff; /* Фирменный синий */
            --color-primary-hover: #4661ff;
            --color-text-main: #FFFFFF;
            --color-text-subtle: #9ca3af;
            --color-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            background-color: var(--color-bg-neutral);
            color: var(--color-text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
        }

        /* Боковая панель (Сайдбар) */
        .sidebar {
            width: 260px;
            background: var(--color-bg-sidebar);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
        }

       .logo-area {
    padding: 0 24px 32px;
    font-weight: 800;
    font-size: 22px;
    color: var(--color-primary);
    letter-spacing: -0.5px;
}

/* 1. Растягиваем правую часть на весь остаток экрана */
.main-content {
    flex: 1; 
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--color-bg-neutral);
}

/* 2. Растягиваем секцию внутри (календарь) */
.view-section {
    display: none;
    flex: 1;
    width: 100%;
    padding: 24px;
    box-sizing: border-box;
}

.view-section.active {
    display: flex;
    flex-direction: column;
}


/* 3. Заставляем саму сетку быть на всю ширину */
.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    flex: 1;
    width: 100%;
    border-top: 1px solid var(--color-border);
    border-left: 1px solid var(--color-border);
}


        .btn-new-post {
            margin: 0 24px 24px;
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }

        .btn-new-post:hover { background: var(--color-primary-hover); }

        .nav-item {
            padding: 10px 24px;
            display: flex; align-items: center; gap: 12px;
            color: var(--color-text-subtle);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-item:hover { color: var(--color-text-main); background: rgba(255,255,255,0.03); }
        .nav-item.active {
            color: var(--color-text-main);
            background: rgba(44, 75, 255, 0.1);
            border-right: 3px solid var(--color-primary);
        }

        .nav-count {
            margin-left: auto;
            font-size: 11px;
            background: var(--color-bg-panel);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* Основная область */
       .main-content { 
            flex-grow: 1; /* Это заставит блок растянуться на всю ширину */
            display: flex; 
            flex-direction: column; 
            min-width: 0; /* Важно, чтобы контент не вылезал */
        }


        header {
            height: 70px;
            padding: 0 40px;
            border-bottom: 1px solid var(--color-border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .view-switcher {
            display: flex;
            background: var(--color-bg-panel);
            padding: 4px;
            border-radius: 8px;
        }

        .sw-btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--color-text-subtle);
        }

        .sw-btn.active { background: #353545; color: white; }

        /* Секции контента */
        .view-section { 
            display: none; 
            padding: 40px; 
            width: 100%; /* Растягиваем на 100% ширины родителя */
            height: 100%; 
            overflow-y: auto; 
        }
        .view-section.active { display: flex; flex-direction: column; }


       /* Сетка календаря */
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: 1fr;
            height: calc(100vh - 110px);
            width: 100%; /* Растягиваем саму сетку */
            border-top: 1px solid var(--color-border);
            border-left: 1px solid var(--color-border);
        }


        .cell {
            border-right: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
            padding: 12px;
            background: var(--color-bg-sidebar);
            min-height: 0;
            display: flex;
            flex-direction: column;
        }




        /* Авторизация */
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--color-bg-neutral);
            display: flex; align-items: center; justify-content: center;
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .modal {
            background: var(--color-bg-sidebar);
            width: 800px; border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area">Lumina</div>
        <button class="btn-new-post" onclick="openModal('postModal')">
            Создать пост
        </button>
        <div class="nav-item active" onclick="switchView('calendar', this)">
            <span>🗓</span> Календарь
        </div>
        <div class="nav-item" onclick="switchView('list', this)">
            <span>📋</span> Очередь
        </div>
        </div>

    <div class="main-content" id="app-body">
        <header>
            <h2 id="headerTitle">Календарь</h2>
            <div class="view-switcher">
                <div id="btn-mode-week" class="sw-btn" onclick="switchCalendarMode('week')">Неделя</div>
                <div id="btn-mode-month" class="sw-btn active" onclick="switchCalendarMode('month')">Месяц</div>
            </div>
        </header>

        <div id="v-calendar" class="view-section active">
            <div class="grid" id="calendarGrid">
                </div>
        </div>

        <div id="v-list" class="view-section">
            <div id="listContent"></div>
        </div>
    </div>


    <script>
        const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM"; 
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null, posts = [];

        // Исправленная навигация
        function switchView(viewName, element) {
            // Убираем активность со всех пунктов
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // Ставим активность на текущий
            element.classList.add('active');

            // Переключаем видимость разделов
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById('v-' + viewName).classList.add('active');

            // Обновляем заголовок в шапке
            const titles = { 'calendar': 'Календарь', 'list': 'Очередь публикаций' };
            document.getElementById('headerTitle').innerText = titles[viewName];
        }

        async function handleAuth() {
            const email = document.getElementById('email').value, password = document.getElementById('pass').value;
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) await db.auth.signUp({ email, password });
        }

        db.auth.onAuthStateChange((ev, session) => {
            if (session) { 
                user = session.user; 
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-body').style.display = 'flex';
                renderCalendar();
            }
        });

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";
            for(let i=1; i<=31; i++) {
                grid.innerHTML += `<div class="cell"><span style="font-size:12px; color:var(--color-text-subtle)">${i}</span></div>`;
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        async function savePost() {
            alert("Пост успешно запланирован!");
            closeModal('postModal');
        }
function switchCalendarMode(mode) {
    // 1. Находим все кнопки переключателя и убираем у них класс 'active'
    document.querySelectorAll('.view-switcher .sw-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    // 2. Добавляем класс 'active' только той кнопке, на которую нажали
    document.getElementById('btn-mode-' + mode).classList.add('active');

    // 3. Управляем содержимым сетки
    const grid = document.getElementById('calendarGrid');
    if (mode === 'month') {
        renderCalendar(); // Вызываем твою функцию отрисовки месяца
    } else {
        // Пока выводим сообщение, что режим недели в разработке
        grid.innerHTML = "<div style='padding:40px; color:var(--color-text-subtle); grid-column: span 7; text-align:center;'>Режим недели скоро появится...</div>";
    }
}

    </script>
</body>
</html>
