<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-main: #0b0b10; --bg-sidebar: #13131a; --bg-panel: #16161e; --bg-input: #20202b; 
            --text-main: #e2e8f0; --text-muted: #64748b; 
            --accent-glow: #c084fc; --btn-light: #d8b4fe; --btn-text: #2e1065; 
            --border-color: #2a2a3f; --error: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: 5000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { width: 360px; background: var(--bg-panel); padding: 40px; border-radius: 24px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* Sidebar & Layout */
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 25px 0; }
        .nav-item { padding: 14px 25px; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; }
        .nav-item.active { color: var(--btn-light); background: rgba(192, 132, 252, 0.08); border-right: 3px solid var(--accent-glow); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Calendar Grid */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin-top: 20px; }
        .cal-day { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; min-height: 140px; padding: 15px; position: relative; transition: 0.2s; }
        .cal-day:hover:not(.empty) { border-color: var(--accent-glow); transform: translateY(-3px); }
        .day-num { font-size: 14px; font-weight: 800; color: var(--text-muted); }
        .day-num.today { color: var(--accent-glow); }

        /* Form Elements */
        input, textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px; color: white; padding: 14px; margin-bottom: 15px; outline: none; font-size: 14px; }
        input:focus, textarea:focus { border-color: var(--accent-glow); }
        button.action { background: var(--btn-light); color: var(--btn-text); width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        button.action:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal { background: var(--bg-sidebar); width: 900px; max-height: 90vh; border-radius: 24px; border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; }
        .modal-grid { display: grid; grid-template-columns: 1.4fr 1fr; flex: 1; overflow-y: auto; }

        .post-chip { background: var(--bg-input); font-size: 11px; padding: 6px 10px; border-radius: 8px; border-left: 3px solid var(--accent-glow); margin-top: 5px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color: var(--btn-light); margin-bottom: 10px;">Lumina</h1>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 30px;">Твой центр управления контентом</p>
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Пароль">
            <button class="action" id="authBtn" onclick="handleAuth()">Войти или Создать</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="padding: 0 25px 40px; font-weight: 900; color: var(--btn-light); font-size: 20px;">MACHINE PRO</div>
        <div class="nav-item active" onclick="switchView('calendar', this)">🗓 Публикации</div>
        <div class="nav-item" onclick="switchView('analytics', this)">📊 Аналитика</div>
        <div class="nav-item" onclick="switchView('ideas', this)">💡 Генератор идей</div>
        <div style="margin-top: auto; padding: 25px;">
            <button onclick="logout()" style="background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px; width: 100%; border-radius: 10px; cursor: pointer;">Выход</button>
        </div>
    </div>

    <div class="main-content" id="app-body" style="display: none;">
        <div id="v-calendar" class="view-section active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 id="monthTitle" style="font-size: 28px;">Апрель 2026</h1>
                <button class="action" style="width: auto; padding: 12px 30px;" onclick="openModal()">+ Новый пост</button>
            </div>
            <div class="calendar-grid" id="grid"></div>
        </div>
        <div id="v-analytics" class="view-section"><h1>📊 Аналитика</h1></div>
        <div id="v-ideas" class="view-section"><h1>💡 Генератор идей</h1></div>
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <div style="padding: 25px 35px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 20px;">Создание публикации</h2>
                <span style="cursor:pointer; font-size: 28px; color: var(--text-muted);" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-grid">
                <div style="padding: 35px; border-right: 1px solid var(--border-color);">
                    <label style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block;">Текст поста</label>
                    <textarea id="mainText" rows="8" placeholder="О чем сегодня расскажем?"></textarea>
                    
                    <label style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block;">Соцсети</label>
                    <div id="plats" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                        </div>
                </div>
                <div style="padding: 35px; background: var(--bg-panel);">
                    <label style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block;">Дата публикации</label>
                    <input type="datetime-local" id="postDate">
                    
                    <button class="action" id="saveBtn" onclick="savePost()" style="margin-top: 40px;">Запланировать в очередь</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let user = null;
        let posts = [];

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const btn = document.getElementById('authBtn');
            btn.disabled = true;
            btn.innerText = "Проверка...";

            // 1. Пробуем войти
            const { data, error: signInError } = await db.auth.signInWithPassword({ email, password });

            if (signInError) {
                // 2. Если не вышло — пробуем создать аккаунт
                const { error: signUpError } = await db.auth.signUp({ email, password });
                if (signUpError) {
                    alert("Ошибка: " + signUpError.message);
                } else {
                    alert("Аккаунт создан! Пожалуйста, войдите.");
                }
            }
            btn.disabled = false;
            btn.innerText = "Войти или Создать";
        }

        db.auth.onAuthStateChange((event, session) => {
            if (session) {
                user = session.user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-body').style.display = 'block';
                loadData();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-body').style.display = 'none';
            }
        });

        function logout() { db.auth.signOut(); }

        async function loadData() {
            const { data, error } = await db.from('posts').select('*').eq('user_id', user.id).order('post_date', { ascending: true });
            if (error) { console.error(error); return; }
            posts = data || [];
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div style="text-align:center; font-size:11px; font-weight:800; color:var(--text-muted); margin-bottom:10px;">${d}</div>`).join('');
            
            const daysInMonth = 30; // Апрель 2026
            const startOffset = 2; // Начинается со среды
            
            for (let i = 0; i < startOffset; i++) grid.innerHTML += '<div class="cal-day empty" style="border:none; background:none;"></div>';
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `2026-04-${String(d).padStart(2, '0')}`;
                const dayPosts = posts.filter(p => p.post_date.includes(dateStr));
                const postsHTML = dayPosts.map(p => `<div class="post-chip">${p.text}</div>`).join('');
                
                grid.innerHTML += `
                    <div class="cal-day">
                        <div class="day-num">${d}</div>
                        ${postsHTML}
                        <button style="position:absolute; bottom:10px; right:10px; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:18px;" onclick="openModal('${dateStr}')">+</button>
                    </div>
                `;
            }
        }

        function openModal(date = '') {
            document.getElementById('postModal').style.display = 'flex';
            if (date) document.getElementById('postDate').value = date + 'T12:00';
            const list = ['Instagram', 'TikTok', 'Telegram', 'YouTube'];
            document.getElementById('plats').innerHTML = list.map(p => `<div style="padding:10px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:10px; cursor:pointer; text-align:center; font-size:12px;" onclick="this.style.borderColor='var(--accent-glow)'; this.classList.toggle('active-plat')">${p}</div>`).join('');
        }

        function closeModal() { document.getElementById('postModal').style.display = 'none'; }

        async function savePost() {
            const text = document.getElementById('mainText').value;
            const date = document.getElementById('postDate').value;
            const activePlats = Array.from(document.querySelectorAll('.active-plat')).map(el => el.innerText);

            if (!date || activePlats.length === 0) return alert("Заполни всё!");

            const { error } = await db.from('posts').insert([{
                user_id: user.id,
                text,
                post_date: date,
                platforms: activePlats,
                status: 'pending'
            }]);

            if (error) alert("Ошибка: " + error.message);
            else { closeModal(); loadData(); }
        }

        function switchView(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
        }
    </script>
</body>
</html>
