<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumina OS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0b0b10;color:#fff;font-family:Inter}
.sidebar{width:260px;background:#13131a}
.glass{background:rgba(19,19,26,0.7);backdrop-filter:blur(10px)}
.neon{border:1px solid transparent;background-clip:padding-box;position:relative}
.neon:before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(90deg,#38bdf8,#c084fc);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor}
.calendar-month{display:grid;grid-template-columns:repeat(7,1fr);flex:1}
.calendar-week{display:grid;grid-template-columns:60px repeat(7,1fr)}
.cell{border:1px solid rgba(255,255,255,0.05);min-height:80px}
</style>
</head>

<body class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<div class="sidebar flex flex-col p-4 gap-2">
<div class="text-xl font-bold">Lumina</div>

<button onclick="openCreate()" class="neon p-3 rounded">Создать</button>
<button onclick="switchView('publish')" class="p-2">Публиковать</button>
<button onclick="switchView('community')" class="p-2">Сообщество</button>

<div class="mt-4">
<div class="text-xs text-gray-400">Каналы</div>
<div id="channels"></div>
<button class="mt-2 p-2 neon rounded">+ Подключить</button>
</div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="p-4 flex justify-between items-center border-b border-white/10">
<div class="text-xl" id="title">Публиковать</div>
<div>
<button onclick="setCalendar('month')">Месяц</button>
<button onclick="setCalendar('week')">Неделя</button>
</div>
</div>

<div id="publishView" class="flex-1 flex flex-col">
<div id="calendar" class="calendar-month"></div>
</div>

<div id="communityView" class="hidden p-4">Комментарии</div>

</div>

<!-- CREATE MODAL -->
<div id="createModal" class="fixed inset-0 hidden">
<div class="absolute inset-0 bg-black/70"></div>

<div class="absolute inset-0 flex">
<div class="flex-1 bg-[#13131a] p-6 overflow-auto">

<div class="flex gap-4 mb-4">
<button onclick="showCreate('ideas')">Идеи</button>
<button onclick="showCreate('post')">Создать публикацию</button>
<button onclick="showCreate('ai')">ИИ</button>
</div>

<!-- IDEAS -->
<div id="ideasBlock">
<input id="catName" placeholder="Категория" class="w-full p-2 bg-black/30 mb-2">
<button onclick="addCategory()">+</button>
<div id="ideas"></div>
</div>

<!-- POST -->
<div id="postBlock" class="hidden">
<textarea id="text" class="w-full h-32 bg-black/30"></textarea>

<div class="flex gap-2 mt-2">
<button onclick="addEmoji('🔥')">😀</button>
<button onclick="insertTags()">#</button>
</div>

<select id="platform">
<option>tiktok</option>
<option>instagram</option>
<option>youtube</option>
<option>pinterest</option>
</select>

<button onclick="savePost()" class="mt-4">Сохранить</button>
</div>

<div id="aiBlock" class="hidden">ИИ позже</div>

<button onclick="closeCreate()" class="mt-6">Закрыть</button>

</div>

<div class="w-[320px] bg-black p-4">
<div class="text-xs mb-2">Предпросмотр</div>
<div id="preview" class="bg-white/5 h-[500px]"></div>
</div>

</div>
</div>

<script>
const db = supabase.createClient(
"https://ltrglnjbsyoelkagqbbh.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM"
);

function switchView(v){
document.getElementById('publishView').classList.add('hidden');
document.getElementById('communityView').classList.add('hidden');

document.getElementById(v+'View').classList.remove('hidden');
}

function openCreate(){document.getElementById('createModal').classList.remove('hidden')}
function closeCreate(){document.getElementById('createModal').classList.add('hidden')}

function showCreate(t){
['ideas','post','ai'].forEach(x=>document.getElementById(x+'Block').classList.add('hidden'))
document.getElementById(t+'Block').classList.remove('hidden')
}

// IDEAS
let cats=[]
function addCategory(){
const name=catName.value
cats.push({name,ideas:[]})
renderIdeas()
}
function renderIdeas(){
ideas.innerHTML=''
cats.forEach(c=>{
let div=document.createElement('div')
div.innerHTML='<b>'+c.name+'</b>'
ideas.appendChild(div)
})
}

// POST
text.oninput=()=>preview.innerText=text.value
function addEmoji(e){text.value+=e}
function insertTags(){text.value+='#lumina #ai'}

async function savePost(){
await db.from('posts').insert({
content:text.value,
platform:platform.value
})
alert('ok')
}

// CALENDAR
function setCalendar(mode){
calendar.className = mode==='month' ? 'calendar-month flex-1' : 'calendar-week'
renderCalendar(mode)
}

function renderCalendar(mode='month'){
calendar.innerHTML=''
if(mode==='month'){
for(let i=1;i<=35;i++){
let d=document.createElement('div')
d.className='cell'
d.innerText=i
calendar.appendChild(d)
}
}else{
for(let h=0;h<24;h++){
let t=document.createElement('div')
t.innerText=h+':00'
calendar.appendChild(t)
for(let d=0;d<7;d++){
let c=document.createElement('div')
c.className='cell'
calendar.appendChild(c)
}
}
}
}

renderCalendar()
</script>

</body>
</html>
