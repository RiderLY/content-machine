<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina OS x Buffer Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-neutral: #0b0b10;
            --color-bg-surface: #13131a;
            --color-bg-panel: #1c1c26;
            --color-primary: #2c4bff; /* Тот самый синий из Buffer */
            --color-primary-hover: #4661ff;
            --color-text-main: #FFFFFF;
            --color-text-subtle: #9ca3af;
            --color-border: rgba(255, 255, 255, 0.1);
            --accent-purple: #c084fc;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            background-color: var(--color-bg-neutral);
            color: var(--color-text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Buffer Style */
        .sidebar {
            width: 260px;
            background: var(--color-bg-surface);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
        }

        .logo-area {
            padding: 0 24px 32px;
            font-weight: 800;
            font-size: 20px;
            color: var(--color-primary);
            letter-spacing: -0.5px;
        }

        .btn-new-post {
            margin: 0 24px 24px;
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-new-post:hover { background: var(--color-primary-hover); }

        .nav-item {
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--color-text-subtle);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-item:hover { color: var(--color-text-main); background: rgba(255,255,255,0.03); }
        .nav-item.active {
            color: var(--color-text-main);
            background: rgba(44, 75, 255, 0.1);
            border-right: 3px solid var(--color-primary);
        }

        .nav-count {
            margin-left: auto;
            font-size: 12px;
            background: var(--color-bg-panel);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; }

        header {
            height: 70px;
            padding: 0 40px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .view-switcher {
            display: flex;
            background: var(--color-bg-panel);
            padding: 4px;
            border-radius: 8px;
        }

        .sw-btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--color-text-subtle);
        }

        .sw-btn.active { background: #353545; color: white; }

        /* View Sections */
        .view-section { display: none; padding: 40px; flex: 1; overflow-y: auto; }
        .view-section.active { display: block; }

        /* Calendar Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid var(--color-border);
            border-left: 1px solid var(--color-border);
        }

        .cell {
            border-right: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
            min-height: 120px;
            padding: 12px;
            background: var(--color-bg-surface);
        }

        /* Toast & Auth */
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--color-bg-neutral);
            display: flex; align-items: center; justify-content: center;
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .modal {
            background: var(--color-bg-surface);
            width: 800px; border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 30px;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="width: 320px; text-align: center;">
            <h1 style="color: var(--color-primary); margin-bottom: 30px;">Lumina</h1>
            <input id="email" type="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; background:var(--color-bg-panel); border:1px solid var(--color-border); color:white; border-radius:8px;">
            <input id="pass" type="password" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:20px; background:var(--color-bg-panel); border:1px solid var(--color-border); color:white; border-radius:8px;">
            <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--color-primary); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Войти</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-area">Lumina</div>
        <button class="btn-new-post" onclick="openModal('postModal')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            New Post
        </button>
        
        <div class="nav-item active" onclick="switchView('calendar', this)">
            <span>🗓</span> Calendar
        </div>
        <div class="nav-item" onclick="switchView('list', this)">
            <span>📋</span> Queue <span class="nav-count" id="qCount">0</span>
        </div>

        <div style="padding: 24px 24px 10px; font-size: 11px; color: var(--color-text-subtle); text-transform: uppercase; font-weight: 700;">Channels</div>
        <div id="chanList"></div>
        <div class="nav-item" style="color: var(--color-primary);" onclick="openModal('connModal')">+ Add Channel</div>
    </div>

    <div class="main-content" id="app-body" style="display: none;">
        <header>
            <h2 id="headerTitle">Calendar</h2>
            <div class="view-switcher">
                <div class="sw-btn active">Week</div>
                <div class="sw-btn">Month</div>
            </div>
        </header>

        <div id="v-calendar" class="view-section active">
            <div class="grid" id="calendarGrid"></div>
        </div>

        <div id="v-list" class="view-section">
            <h2 style="margin-bottom: 24px;">Upcoming Posts</h2>
            <div id="listContent"></div>
        </div>
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Create New Post</h3>
                <span style="cursor:pointer;" onclick="closeModal('postModal')">✕</span>
            </div>
            <textarea id="mainText" placeholder="What would you like to share?" style="width:100%; height:150px; background:var(--color-bg-panel); border:1px solid var(--color-border); color:white; padding:15px; border-radius:12px; margin-bottom:20px; resize:none;"></textarea>
            <button onclick="savePost()" style="width:100%; padding:15px; background:var(--color-primary); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Schedule Post</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ltrglnjbsyoelkagqbbh.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cmdsbmpic3lvZWxrYWdxYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzgyNDksImV4cCI6MjA5MDc1NDI0OX0.VhZiD9OVDfv3nlfYysBNXPsax4RkevErwWImMlqW9BM"; 
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null, posts = [];

        // Функция переключения вкладок (Сделал пошагово и понятно)
        function switchView(viewName, element) {
            // 1. Убираем активный класс у всех кнопок в меню
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // 2. Добавляем активный класс нажатой кнопке
            element.classList.add('active');

            // 3. Прячем все секции контента
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            // 4. Показываем нужную
            document.getElementById('v-' + viewName).classList.add('active');

            // 5. Меняем заголовок в шапке
            document.getElementById('headerTitle').innerText = viewName.charAt(0).toUpperCase() + viewName.slice(1);
        }

        async function handleAuth() {
            const email = document.getElementById('email').value, password = document.getElementById('pass').value;
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) await db.auth.signUp({ email, password });
        }

        db.auth.onAuthStateChange((ev, session) => {
            if (session) { 
                user = session.user; 
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-body').style.display = 'flex';
                renderCalendar();
            }
        });

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";
            for(let i=1; i<=31; i++) {
                grid.innerHTML += `<div class="cell"><span style="font-size:12px; color:var(--color-text-subtle)">${i}</span></div>`;
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        async function savePost() {
            alert("Пост сохранен! (Тут будет логика Supabase)");
            closeModal('postModal');
        }
    </script>
</body>
</html>
